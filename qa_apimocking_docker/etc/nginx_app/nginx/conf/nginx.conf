user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    server_names_hash_bucket_size 128;
    include /etc/nginx/sites-available/*;
    
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    upstream python {
        server python_app:8000;
    }
    upstream nginx_api {
        server nginx_app:8001;
    }
    upstream admin_api {
        server admin_app:8002;
    }
    upstream user_api {
        server user_app:8003;
    }
    upstream service_api {
        server service_app:8004;
    }
    upstream dashboard_api {
        server dashboard_app:8005;
    }
    upstream chatbot_api {
        server chatbot_app:8006;
    }
    upstream database_api {
        server cassandradb:8010;
    }
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    keepalive_timeout  65;
}
